<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>脑肿瘤图像生成系统</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <h1>🧠 脑肿瘤图像可控生成系统</h1>
    <p class="subtitle">可解释 · 可交互 · 医学先验驱动</p>
  </header>

  <main class="container">
    <!-- 左侧：控制面板 -->
    <section class="panel control-panel">
      <h2>条件控制</h2>

      <!-- 手绘 Mask -->
      <div class="form-group">
        <label>肿瘤位置（在画布上绘制）</label>
        <div class="canvas-wrapper">
          <canvas id="maskCanvas" width="256" height="256"></canvas>
          <div class="canvas-tools">
            <button id="btnDraw" class="tool-btn active" title="画笔">✏️</button>
            <button id="btnErase" class="tool-btn" title="橡皮擦">🧹</button>
            <button id="btnClear" class="tool-btn" title="清除">🗑️</button>
          </div>
        </div>
      </div>

      <!-- 形态参数 -->
      <div class="form-group">
        <label>形态类型</label>
        <div class="radio-group">
          <label><input type="radio" name="shape" value="round" /> 圆形</label>
          <label><input type="radio" name="shape" value="irregular" checked /> 不规则</label>
          <label><input type="radio" name="shape" value="ring" /> 环形强化</label>
        </div>
      </div>

      <div class="form-group">
        <label>肿瘤大小：<span id="sizeVal">3.0</span> cm</label>
        <input type="range" id="sizeSlider" min="0.5" max="8" step="0.5" value="3.0"
               oninput="document.getElementById('sizeVal').textContent=this.value" />
      </div>

      <!-- 侵袭参数 -->
      <div class="form-group">
        <label>WHO 分级：<span id="gradeVal">2</span></label>
        <input type="range" id="gradeSlider" min="1" max="4" step="1" value="2"
               oninput="document.getElementById('gradeVal').textContent=this.value" />
        <div class="grade-labels">
          <span>低级别</span><span>高级别</span>
        </div>
      </div>

      <div class="form-group">
        <label>水肿范围：<span id="edemaVal">1.5</span> cm</label>
        <input type="range" id="edemaSlider" min="0" max="5" step="0.5" value="1.5"
               oninput="document.getElementById('edemaVal').textContent=this.value" />
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="enhancementCheck" />
          对比增强（Gd+）
        </label>
      </div>

      <button id="generateBtn" class="btn-generate">
        <span id="btnText">生成图像</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>
    </section>

    <!-- 右侧：输出区域 -->
    <section class="panel output-panel">
      <h2>生成结果</h2>

      <div class="output-grid">
        <div class="output-item">
          <p class="output-label">生成 MRI</p>
          <img id="outputImg" src="/static/img/placeholder.png" alt="生成图像" />
        </div>
        <div class="output-item">
          <p class="output-label">侵袭先验图</p>
          <img id="invasionImg" src="/static/img/placeholder.png" alt="侵袭先验" />
        </div>
        <div class="output-item full-width">
          <p class="output-label">条件贡献热图</p>
          <img id="heatmapImg" src="/static/img/placeholder.png" alt="热图" />
        </div>
      </div>

      <!-- 可解释性报告 -->
      <div class="report-section">
        <h3>可解释性报告</h3>
        <div id="reportContent" class="report-placeholder">
          生成图像后，报告将在此显示
        </div>
      </div>
    </section>
  </main>

  <script src="/static/js/canvas.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
